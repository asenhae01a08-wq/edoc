<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro de Aluno</title>

<!--CSS -->
<link rel="stylesheet" href="style5.css">
</head>
<body>
<div class="container">
<h1>Cadastrar Novo Aluno</h1>

<form id="formAluno">
<label for="nome">Nome completo</label>
<input type="text" id="nome" placeholder="Digite o nome completo">

<label for="matricula">Matrícula</label>
<input type="text" id="matricula" placeholder="Digite a matrícula">

<label for="cpf">CPF</label>
<input type="text" id="cpf" maxlength="14" placeholder="000.000.000-00">

<label for="email">Email</label>
<input type="email" id="email" placeholder="Digite o email">

<label for="dataNascimento">Data de nascimento</label>
<input type="date" id="dataNascimento">

<button type="submit">
 Salvar
</button>
</form>
</div>

<!--JavaScript -->
<script src="script5.JS"></script>
</body>
</html>
