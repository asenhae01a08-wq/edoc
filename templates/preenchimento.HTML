<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro de Aluno</title>

<!--CSS -->
  <link rel="stylesheet" href="{{url_for('static',filename='style5.css')}}">
</head>
<body class="container mt-5">
  {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    
<div class="container">
<h1>Cadastrar Novo Aluno</h1>

<form id="formAluno">
<label for="nome">Nome completo</label>
<input type="text" id="nome" placeholder="Digite o nome completo">

<label for="matricula">Matrícula</label>
<input type="text" id="matricula" placeholder="Digite a matrícula">

<label for="cpf">CPF</label>
<input type="text" id="cpf" maxlength="14" placeholder="000.000.000-00">

<label for="email">Email</label>
<input type="email" id="email" placeholder="Digite o email">

<label for="dataNascimento">Data de nascimento</label>
<input type="date" id="dataNascimento">

<button type="submit">
 Salvar
</button>
</form>
</div>

<!--JavaScript -->
<script src="{{url_for('static',filename='script5.js')}}"></script>
</body>
</html>
